proxy_location: EveryNode
applications:
  - name: cosmos3_omni
    route_prefix: /
    import_path: cosmos_framework.inference.ray.serve:router_app_builder
    args:
      app:
        output_dir: "outputs/ray_serve"
      models:
        Cosmos3-Nano:
          setup:
            checkpoint_path: "Cosmos3-Nano"
            guardrails: False
            parallelism_preset: throughput
