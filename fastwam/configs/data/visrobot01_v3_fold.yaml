# visrobot01 v3 叠衣服 —— wam_fold_v3 数据集，abs joint angle 输出。
# 数据来源: wam_fold_v3/visrobot01_v3_train (merge_and_split.py 产出，~2207 ep)
# 测试集: visrobot01_v3_val (~246 ep)，不进训练
# 其余参数对齐 visrobot01_fold.yaml（chunk48/mae@48/3cam/14dim/z-score/abs-angle）
train:
  _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - /mnt/pfs/p46h4f/cosmos/deepdive_kai0/kai0/data/wam_fold_v3/visrobot01_v3_train
  shape_meta:
    images:
      - key: top_head
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: hand_left
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: hand_right
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
    action:
      - key: default
        raw_shape: 14
        shape: 14
    state:
      - key: default
        raw_shape: 14
        shape: 14
  num_frames: 49
  global_sample_stride: 1
  action_video_freq_ratio: 4
  video_size: [384, 320]
  camera_key: null
  val_set_proportion: 0.0
  is_training_set: true
  pretrained_norm_stats: ./data/visrobot01_v3_fold/dataset_stats.json
  skip_padding_as_possible: false
  concat_multi_camera: "robotwin"
  # vae_latent_v3fix: 修正相机顺序(top_head=主图)重算的 latent;旧 vae_latent 把俯视图压进腕部小槽(2026-06-17 根因)
  latent_cache_dir: /mnt/pfs/p46h4f/cosmos/deepdive_kai0/kai0/data/wam_fold_v3/visrobot01_v3_train/vae_latent_v3fix
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 3
    action_output_dim: 14
    proprio_output_dim: 14
    action_state_transforms: null
    use_stepwise_action_norm: False
    norm_default_mode: "z-score"
    norm_exception_mode: null
    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
  text_embedding_cache_dir: ./data/text_embeds_cache/visrobot01_v3_fold
  context_len: 128

val:
  _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - /mnt/pfs/p46h4f/cosmos/deepdive_kai0/kai0/data/wam_fold_v3/visrobot01_v3_val
  shape_meta:
    images:
      - key: top_head
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: hand_left
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: hand_right
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
    action:
      - key: default
        raw_shape: 14
        shape: 14
    state:
      - key: default
        raw_shape: 14
        shape: 14
  num_frames: 49
  global_sample_stride: 1
  action_video_freq_ratio: 4
  video_size: [384, 320]
  camera_key: null
  val_set_proportion: 0.0
  is_training_set: false
  pretrained_norm_stats: ./data/visrobot01_v3_fold/dataset_stats.json
  skip_padding_as_possible: false
  concat_multi_camera: "robotwin"
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 3
    action_output_dim: 14
    proprio_output_dim: 14
    action_state_transforms: null
    use_stepwise_action_norm: False
    norm_default_mode: "z-score"
    norm_exception_mode: null
    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
  text_embedding_cache_dir: ./data/text_embeds_cache/visrobot01_v3_fold
  context_len: 128
