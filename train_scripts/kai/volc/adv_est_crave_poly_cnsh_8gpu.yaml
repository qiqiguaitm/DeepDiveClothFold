# CRAVEвҶ’KAI0-AE йҮҚи®ӯ В· CRAVE-KAI-AE (polyline еҺ»йҳ¶жўҜж Үзӯҫ) вҖ” robot-task 8 A100, 50k
#   plan: docs/training/future_plans/plans/crave_polyline_kai_ae_retrain_plan.md В§8
#   Config: ADVANTAGE_TORCH_CRAVE_POLY (AdvantageEstimatorConfig, loss_value=1/action=0, init pi05_base strict=False)
#   Data:   crave_stage_poly (3055ep, CRAVE DINOv3-base imgвҠ•proprioвҶ’еҸҢй”ҡViterbiвҶ’polyline stage_progress_gt 0вҶ’1;
#           еә•=kai0_base, videos/meta symlinkвҶ’kai0_base, normвҶҗcrave_stage_A; polyline-vs-T corr 0.947 жң«еҖјmedian 1.0)
#   зӣ®ж Ү: polyline е№ІеҮҖзӣ‘зқЈйҮҚи®ӯ pi0-AE вҶ’ зҰ»зәҝзңӢ value/advantage жҳҜеҗҰжҜ” AE-C(adv_est_v1/100000) жӣҙе№іж»‘/зҝ»иҪ¬е°‘(В§5 йқһ-circular).
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/adv_est_crave_poly_cnsh_8gpu.yaml

TaskName: "adv-est-crave-poly-cnsh-8gpu"
Description: "CRAVE-KAI-AE йҮҚи®ӯ: AdvantageEstimator on crave_stage_poly (polyline еҺ»йҳ¶жўҜж Үзӯҫ 3055ep), PyTorch 8 A100 50k"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"     # 8Г— A100-80G

ActiveDeadlineSeconds: 259200           # 72 h cap (PyTorch AE ж…ў, 50k иҝңеӨҹ)
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: WANDB_MODE
    Value: "offline"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: TORCH_NCCL_BLOCKING_WAIT
    Value: "0"
  - Name: NCCL_ASYNC_ERROR_HANDLING
    Value: "1"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/adv_est_crave_poly_${STAMP}.log"
  exec >> "$LOG" 2>&1
  echo "=== AE-A (crave_stage_poly) train start $(date) (PyTorch DDP 8 A100) ==="
  set -ex
  nvidia-smi -L

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  mkdir -p /home/tim/.local/share /root/.local/share
  ln -sfn /vePFS/tim/.local/share/uv /home/tim/.local/share/uv
  ln -sfn /vePFS/tim/.local/share/uv /root/.local/share/uv
  cd "$KAI0"
  source .venv/bin/activate
  apt-get update 2>&1 | tail -1 && apt-get install -y ffmpeg 2>&1 | tail -1 || echo "ffmpeg install skipped"
  python -c "import torch; print(f'torch {torch.__version__} cuda={torch.cuda.is_available()} dev={torch.cuda.device_count()}')"

  # PRE-FLIGHT (CRAVE anchor-linear ж Үзӯҫ; д»Ҙ kai0_base дёәеә•; videos symlinkвҶ’kai0_base; normвҶҗkai0_base)
  TRAIN=$KAI0/data/Task_A/self_built/crave_stage_poly
  INIT=/vePFS/tim/workspace/deepdive_kai0/kai0/checkpoints/pi05_base/pytorch
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: train data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: norm_stats missing $TRAIN" >&2; exit 13; }
  python -c "import pyarrow.parquet as pq,glob,sys; f=sorted(glob.glob('$TRAIN/data/chunk-000/*.parquet'))[0]; cols=[c.name for c in pq.read_schema(f)]; sys.exit(0 if 'stage_progress_gt' in cols else 13)" || { echo "FATAL: stage_progress_gt missing" >&2; exit 13; }
  # и§Ҷйў‘иҪҜй“ҫиғҪи§ЈжһҗеҮәзңҹе®һ mp4 (crave/videosвҶ’kai0_advantage/videosвҶ’kai0_base)
  V=$(find -L "$TRAIN/videos/chunk-000/observation.images.top_head" -name '*.mp4' -print -quit 2>/dev/null)
  [ -n "$V" ] && [ -e "$V" ] || { echo "FATAL: crave video symlink ж–ӯй“ҫ (videosвҶ’kai0_base еӨұж•Ҳ?)" >&2; exit 13; }
  [ -f "$INIT/model.safetensors" ] || { echo "FATAL: pi05_base pytorch init missing $INIT" >&2; exit 13; }
  echo "[$(date)] preflight OK (crave_stage_poly + stage_progress_gt + norm + video resolve + pi05_base)"

  EXP=crave_poly
  CKPT_DIR=$KAI0/checkpoints/ADVANTAGE_TORCH_CRAVE_POLY/$EXP
  RES=""
  if ls -d "$CKPT_DIR"/[0-9]*/ >/dev/null 2>&1; then RES="--resume"; echo "[resume] found ckpt вҶ’ --resume"; fi

  MASTER_PORT="${TORCH_DDP_MASTER_PORT:-15843}"
  exec torchrun \
    --nnodes=1 --node_rank=0 --nproc_per_node=8 \
    --master_addr=127.0.0.1 --master_port=$MASTER_PORT \
    scripts/train_pytorch.py ADVANTAGE_TORCH_CRAVE_POLY \
    --exp_name=$EXP \
    --save_interval 10000 \
    --batch-size 144 \
    $RES

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 2

AccessType: "Public"
