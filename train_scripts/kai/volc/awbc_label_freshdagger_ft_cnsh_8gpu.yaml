# AWBC Stage-2 labeling — run adv_est_v1 over A_v4_freshdagger_ft (973ep/894k frames)
#   plan: pi05_v4_awbc_dct_freshdagger_finetune_plan.md §2 stage 2. robot-task 1-host 8 A100 = 8 workers (ep%8).
#   Torch AdvantageEstimator + cv2. Output: <ds>/data_KAI0_100000/chunk-000/episode_*.parquet (加 absolute_advantage 列)
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/awbc_label_freshdagger_ft_cnsh_8gpu.yaml

TaskName: "awbc-label-freshdagger-ft-cnsh-8gpu"
Description: "freshdagger_ft Stage2: adv_est_v1 打标 A_v4_freshdagger_ft (973ep/894k), robot-task 1-host 8 A100, ep%8 shard"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G single host = 8 workers

ActiveDeadlineSeconds: 86400
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  NODE=${MLP_ROLE_INDEX:-0}
  NUMNODES=${MLP_WORKER_NUM:-1}
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/awbc_label_freshft_${STAMP}_node${NODE}.log"
  exec >> "$LOG" 2>&1
  echo "=== AWBC labeling freshdagger_ft start $(date) node=$NODE/$NUMNODES ==="
  set -x
  nvidia-smi -L

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  if [ ! -x "$HOME/.local/bin/uv" ]; then curl -LsSf https://astral.sh/uv/install.sh | sh; fi
  export PATH="$HOME/.local/bin:$PATH"
  uv python install 3.11.15 2>&1 | tail -2
  mkdir -p /home/tim/.local/share
  ln -sfn /root/.local/share/uv /home/tim/.local/share/uv

  cd "$KAI0"
  source .venv/bin/activate
  python -c "import torch, cv2; print('torch',torch.__version__,'cv2',cv2.__version__,'cuda',torch.cuda.is_available(),'ngpu',torch.cuda.device_count())"

  DS=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_v4_freshdagger_ft
  CKPT=/vePFS/tim/workspace/deepdive_kai0/kai0/checkpoints/ADVANTAGE_TORCH_KAI0_FLATTEN_FOLD/adv_est_v1/100000
  [ -f "$DS/meta/episodes.jsonl" ]   || { echo "FATAL: dataset missing $DS" >&2; exit 13; }
  [ -f "$CKPT/model.safetensors" ]   || { echo "FATAL: estimator ckpt missing $CKPT" >&2; exit 13; }
  echo "[$(date)] dataset + estimator verified"

  NW=$(( NUMNODES * 8 ))   # total workers = 8
  cd "$KAI0/stage_advantage/annotation"
  for g in 0 1 2 3 4 5 6 7; do
    WID=$(( NODE * 8 + g ))
    echo "[launch] node=$NODE gpu=$g worker-id=$WID / num-workers=$NW"
    CUDA_VISIBLE_DEVICES=$g python -u eval.py Flatten-Fold KAI0 "$DS" --num-workers $NW --worker-id $WID \
        > "$LOG_DIR/awbc_label_freshft_${STAMP}_node${NODE}_gpu${g}.log" 2>&1 &
  done
  wait
  echo "=== node $NODE all 8 workers done $(date) ==="

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0

AccessType: "Public"
