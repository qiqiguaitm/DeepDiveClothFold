# AWBC milestone-value A臂 三档(pos/normal/neg, CRAVE 天然形态) — 正式收敛训练
#   plan: awbc_milestone_value_AB_plan.md §5b/§10.3 (本地 2 卡仅 sanity, 正式训练交集群)
#   cnsh robot-task 1-host 8 A100, 50k. Config pi05_awbc_mv_A_3lvl (= pi05_awbc_mv_A 仅 repo_id 换 3 档集).
#   Data: dagger_all_mvA_3lvl (neg5.1%/normal48.9%/pos46.1%) | Init: task_a_new_smooth_800_step49999
#   ⭐ 可重载可 resume: entrypoint 自动探测 ckpt → --resume; RetryOptions 重试时从最近 ckpt 续 (save 每 2k).
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/awbc_mv_A_3lvl_cnsh_8gpu.yaml

TaskName: "pi05-awbc-mv-a-3lvl-cnsh-8gpu"
Description: "AWBC mv-value A臂 三档(CRAVE): pi05_awbc_mv_A_3lvl on dagger_all_mvA_3lvl, JAX 1-host 8 A100, 50k, resumable"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"
Preemptible: true               # 闲时任务: 借空闲资源可被抢占 → 入口自动从最新 ckpt resume

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G

ActiveDeadlineSeconds: 259200
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.9"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"

Entrypoint: |
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  NODE=${MLP_ROLE_INDEX:-0}
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/awbc_mv_A_3lvl_${STAMP}_node${NODE}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) node=$NODE (1-host 8 A100) ==="
  set -ex
  nvidia-smi -L

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  if [ ! -x "$HOME/.local/bin/uv" ]; then curl -LsSf https://astral.sh/uv/install.sh | sh; fi
  export PATH="$HOME/.local/bin:$PATH"
  uv python install 3.11.15 2>&1 | tail -1
  mkdir -p /home/tim/.local/share && ln -sfn /root/.local/share/uv /home/tim/.local/share/uv
  cd "$KAI0"
  source .venv/bin/activate
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  TRAIN=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/dagger_all_mvA_3lvl
  INIT=/vePFS/tim/workspace/deepdive_kai0/kai0/checkpoints/task_a_new_smooth_800_step49999/params
  VAL=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/vis_v2_merged_val
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: ds_A_3lvl missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: ds_A_3lvl norm missing" >&2; exit 13; }
  [ -f "$TRAIN/meta/tasks.jsonl" ]    || { echo "FATAL: ds_A_3lvl tasks.jsonl missing" >&2; exit 13; }
  [ -f "$INIT/_METADATA" ]            || { echo "FATAL: warm-start init missing $INIT" >&2; exit 13; }
  [ -f "$VAL/meta/episodes.jsonl" ]   || { echo "FATAL: inline-eval val missing $VAL" >&2; exit 13; }
  echo "[$(date)] preflight OK (ds_A_3lvl + norm + tasks + warm-start + val)"

  # ⭐ 可 resume: 探测已存在 ckpt (= config.checkpoint_dir = $KAI0/checkpoints/<name>/<exp>) → --resume, 否则 fresh --overwrite
  EXP=awbc_mv_A_3lvl
  CKPT_DIR=$KAI0/checkpoints/pi05_awbc_mv_A_3lvl/$EXP
  if ls -d "$CKPT_DIR"/[0-9]*/ >/dev/null 2>&1; then RES="--resume"; echo "[resume] found ckpt in $CKPT_DIR → --resume"; else RES="--overwrite"; echo "[resume] no ckpt → fresh --overwrite"; fi

  # save-interval 1000 (闲时 override config 2000): 被抢占时少丢步 → 进度可累积
  exec python -u scripts/train.py pi05_awbc_mv_A_3lvl \
    --exp-name "$EXP" \
    --no-wandb-enabled \
    --save-interval 1000 \
    $RES

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 10            # 闲时被抢占后重试 (配合入口 --resume 续训); QOS-evict 平台不自动重试→另挂 self-heal

AccessType: "Public"
