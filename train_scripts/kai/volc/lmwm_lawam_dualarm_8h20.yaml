# LMWM×LaWAM 双臂对比: milestone(Path A) vs baseline(no-swap) 8×H20 北京
# 双臂并行在同一节点: M=GPU0-3, B=GPU4-7, 各25000步, save_interval=5000
# 提交(cnbj/gsy, 先 source ~/.bashrc):
#   cd ~/workspace/deepdive_kai0/train_scripts/kai/volc
#   /vePFS-North-E/vis_robot/workspace/deepdive_kai0/kai0/.venv/bin/python submit_yaml.py lmwm_lawam_dualarm_8h20.yaml

TaskName: "lmwm-lawam-dualarm-8h20"
Description: "LMWM milestone vs LaWAM next-frame dual-arm comparison, 8×H20 (M GPU0-3 / B GPU4-7), 25000steps each"
Tags: []

ImageUrl: "dvs-cr-cn-beijing.cr.volces.com/vis_robot/kai:kai0-gf1"
ResourceQueueName: "Robot-North-H20"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni3ln.45xlarge"   # 8× H20-SXM5-96GB single node

ActiveDeadlineSeconds: 86400   # 24h (双臂各~10h)
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnbj875793a96d6b"
    MountPath: "/vePFS-North-E/vis_robot"
    SubPath: "/vis_robot"

CacheType: "Cloudfs"

Envs:
  - Name: PYTHONUNBUFFERED
    Value: "1"
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: REPO
    Value: "/vePFS-North-E/vis_robot/workspace/deepdive_kai0"

Entrypoint: |
  set -uo pipefail
  REPO=/vePFS-North-E/vis_robot/workspace/deepdive_kai0
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=$REPO/lmvla/lawam/logs/volc_dualarm
  mkdir -p "$LOG_DIR"
  echo "=== LMWM×LaWAM dual-arm start $(date -u) ===" | tee "$LOG_DIR/startup_${STAMP}.log"
  exec >> "$LOG_DIR/dualarm_${STAMP}.log" 2>&1
  set -x

  # ---- 验证硬件 ----
  nvidia-smi -L | head -8
  python3 -c "import torch; print('torch', torch.__version__, 'cuda', torch.cuda.is_available(), 'ndev', torch.cuda.device_count())"

  # ---- 安装 starVLA 依赖(镜像有 torch 但缺少 accelerate/transformers5.x/flash-attn) ----
  pip install --quiet accelerate==1.13.0 transformers==5.2.0 2>&1 | tail -3
  pip install --quiet flash-attn==2.8.3 --no-build-isolation 2>&1 | tail -3 || echo "[warn] flash-attn 编译失败, 继续(无 flash-attn)"

  # ---- 验证关键模块 ----
  cd $REPO/lmvla/lawam
  python3 -c "
  import torch; import transformers; import accelerate
  print(f'torch={torch.__version__} tf={transformers.__version__} acc={accelerate.__version__}')
  from starVLA.model.framework.vlas.lawam import LatentWorldPolicyBackend
  print('LatentWorldPolicyBackend import OK')
  "

  # ---- 环境变量(臂特定) ----
  LMWM=$REPO/lmvla/lmwm
  LMWM_CKPT_VAL=$LMWM/checkpoints/lmwm_libero_dinov3base/lmwm.pt
  LMWM_PAIRS=$LMWM/data/libero_milestone/pairs.npz
  LMWM_COMPACT=$LMWM/data/libero_milestone/target_compact.npz
  ADAPTER_DIR=$REPO/lmvla/lawam

  # 预检所有输入
  for f in "$LMWM_CKPT_VAL" "$LMWM_PAIRS" "$LMWM_COMPACT"; do
    [ -f "$f" ] || { echo "FATAL: $f missing" >&2; exit 13; }
  done
  echo "[$(date)] preflight OK"

  # ==== ARM M: milestone Path A (GPU0-3) ====
  (
    export CUDA_VISIBLE_DEVICES=0,1,2,3
    export MASTER_PORT=29511
    export LMWM_CKPT=$LMWM_CKPT_VAL
    export LMWM_MILESTONE_TARGET=$LMWM_PAIRS
    export LMWM_TARGET_COMPACT=$LMWM_COMPACT
    export LMWM_ADAPTER_DIR=$ADAPTER_DIR
    export LMWM_SWAP_TEACHER=1
    export LAWAM_RUN_TIMESTAMP=${STAMP}_M

    bash train_lawam_distributed.sh \
      --config_yaml starVLA/config/training/train_libero.yaml \
      --run_id=lmwm_milestone_pathA_volc \
      --trainer.max_train_steps=25000 \
      --trainer.save_interval=5000
    echo "[$(date)] ARM M DONE"
  ) &

  # ==== ARM B: no-swap baseline (GPU4-7) ====
  (
    export CUDA_VISIBLE_DEVICES=4,5,6,7
    export MASTER_PORT=29522
    unset LMWM_CKPT LMWM_MILESTONE_TARGET LMWM_TARGET_COMPACT LMWM_SWAP_TEACHER
    export LAWAM_RUN_TIMESTAMP=${STAMP}_B

    bash train_lawam_distributed.sh \
      --config_yaml starVLA/config/training/train_libero.yaml \
      --run_id=lawam_baseline_noswap_volc \
      --trainer.max_train_steps=25000 \
      --trainer.save_interval=5000
    echo "[$(date)] ARM B DONE"
  ) &

  wait
  echo "=== LMWM×LaWAM dual-arm DONE $(date -u) ==="

  # 输出 checkpoint 位置供后续 eval
  echo "M ckpt dir: \$(ls -d $REPO/lmvla/lawam/results/Checkpoints/libero/*milestone_pathA* | tail -1)"
  echo "B ckpt dir: \$(ls -d $REPO/lmvla/lawam/results/Checkpoints/libero/*baseline_noswap* | tail -1)"

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0

AccessType: "Public"
