# Task_AH1 (Horizontal Fold v1 新 SOP) 首次基线 — cnsh 1-host 8 A100, 50k
#   plan: docs/training/future_plans/plans/pi05_fold_sop_paradigm_baselines.md §2.B
#   Config: pi05_task_ah1_hfold_v1_200 (config.py, fsdp_devices=8)
#   Data:   Task_AH1_170 (单日 200ep 切前 170; v3 前裁) | val: Task_AH1_val (末 30ep)
#   Init:   warm-start mixed_1_clean/params | prompt 规范 "Horizontal Fold v1." (train==deploy 一字不差)
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/pi05_task_ah1_hfold_v1_200_cnsh_8gpu.yaml

TaskName: "pi05-task-ah1-hfold-v1-200-cnsh-8gpu"
Description: "Task_AH1 Horizontal-Fold-v1 首次基线: JAX 1-host 8 A100, mixed_1_clean warm-start, 50k"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G per host × 1 = 8 GPU

ActiveDeadlineSeconds: 172800
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.85"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"

Entrypoint: |
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  NODE=${MLP_ROLE_INDEX:-0}
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/pi05_task_ah1_hfold_v1_200_${STAMP}_node${NODE}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) node=$NODE/${MLP_WORKER_NUM:-1} (1-host 8 A100) ==="
  set -ex
  nvidia-smi -L

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  if [ ! -x "$HOME/.local/bin/uv" ]; then curl -LsSf https://astral.sh/uv/install.sh | sh; fi
  export PATH="$HOME/.local/bin:$PATH"
  uv python install 3.11.15 2>&1 | tail -2
  mkdir -p /home/tim/.local/share && ln -sfn /root/.local/share/uv /home/tim/.local/share/uv
  cd "$KAI0"
  source .venv/bin/activate
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  # PRE-FLIGHT
  TRAIN=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_AH1_170
  VAL=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_AH1_val
  INIT=/vePFS/tim/shared_ckpt/Task_A/mixed_1_clean/params
  [ -f "$TRAIN/meta/episodes.jsonl" ]  || { echo "FATAL: train data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]      || { echo "FATAL: train norm_stats missing" >&2; exit 13; }
  [ -f "$VAL/meta/episodes.jsonl" ]    || { echo "FATAL: val missing $VAL" >&2; exit 13; }
  [ -f "$INIT/_METADATA" ]             || { echo "FATAL: mixed_1_clean init missing $INIT" >&2; exit 13; }
  echo "[$(date)] preflight OK (Task_AH1_170 + norm + val + mixed_1_clean init verified)"

  # 单节点: train.py 自动用本机 8 GPU
  exec python -u scripts/train.py pi05_task_ah1_hfold_v1_200 \
    --exp-name pi05_task_ah1_hfold_v1_200_cnsh \
    --no-wandb-enabled \
    --overwrite

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 1

AccessType: "Public"
