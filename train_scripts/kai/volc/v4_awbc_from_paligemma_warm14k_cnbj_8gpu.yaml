# AWBC v4 × from-PaliGemma warm14k 续训 — cnbj 1-host 8 H20, 100k
#   背景: 原 from_paligemma 跑到 step 14000 后, cnbj vePFS 满盘清理时 train_state 被删 → 无法 orbax --resume.
#   params(含已训 action expert)完好 → CheckpointWeightLoader 全量 warm-start 14000/params 继续跑 100k.
#   血统仍纯由 PaliGemma init 派生, 冷启动语义不污染; 唯一非理想 = 优化器/LR 在14k处一次重启. 见 config.py 注释.
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/v4_awbc_from_paligemma_warm14k_cnbj_8gpu.yaml
TaskName: "pi05-v4-awbc-from-paligemma-warm14k-cnbj-8gpu"
Description: "v4 AWBC from-PaliGemma warm14k 续训 (14000/params 全量warm-start, train_state被删无法resume): JAX 1-host 8 H20, 100k, 闲时+resume"
Tags: []

ImageUrl: "dvs-cr-cn-beijing.cr.volces.com/vis_robot/kai:kai0-gf1"
ResourceQueueName: "Robot-North-H20"
Framework: "PyTorch"
Preemptible: true               # 闲时任务: 借空闲资源, 可被抢占 → 入口自动 resume (新 ckpt 路径 train_state 会正常保存)

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni3ln.45xlarge"   # 8× H20-SXM5-96GB single node

ActiveDeadlineSeconds: 1209600  # 14 天/run

EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnbj875793a96d6b"
    MountPath: "/vePFS-North-E/vis_robot"
    SubPath: "/vis_robot"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.85"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  NODE=${MLP_ROLE_INDEX:-0}
  LOG_DIR=/vePFS-North-E/vis_robot/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/v4_awbc_from_paligemma_warm14k_${STAMP}_node${NODE}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) (1-host 8 H20, 闲时任务, warm14k 续训) ==="
  set -x
  nvidia-smi -L
  REPO=/vePFS-North-E/vis_robot/workspace/deepdive_kai0
  cd "$REPO/kai0"
  source .venv/bin/activate
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  TRAIN=$REPO/kai0/data/Task_A/self_built/A_v4_base_dagger
  WARM=$REPO/kai0/checkpoints/pi05_v4_awbc_from_paligemma/v4_awbc_from_paligemma_cnbj/14000/params
  VAL=$REPO/kai0/data/Task_A/self_built/vis_v2_merged_val
  [ -f "$TRAIN/meta/episodes.jsonl" ]   || { echo "FATAL: v4 labeled data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]       || { echo "FATAL: v4 norm_stats missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/meta/tasks.jsonl" ]      || { echo "FATAL: discretized tasks.jsonl missing" >&2; exit 13; }
  [ -f "$WARM/_METADATA" ]              || { echo "FATAL: warm-start 14000/params missing $WARM (train_state被删仍需params)" >&2; exit 13; }
  [ -f "$VAL/meta/episodes.jsonl" ]     || { echo "FATAL: inline-eval val missing $VAL" >&2; exit 13; }
  SL=$(find "$TRAIN/videos" -type l | head -1)
  [ -e "$SL" ] || { echo "FATAL: video symlink broken $SL -> $(readlink "$SL")" >&2; exit 13; }
  echo "[$(date)] preflight OK (v4 data + norm + tasks + warm14k params + val + video symlink verified)"

  # 自动 resume: 新 ckpt 路径 (config=pi05_v4_awbc_from_paligemma_warm14k); 有 step 目录 → --resume, 否则 --overwrite.
  EXP=v4_awbc_from_paligemma_warm14k_cnbj
  CKPT_DIR=$REPO/kai0/checkpoints/pi05_v4_awbc_from_paligemma_warm14k/$EXP
  if ls -d "$CKPT_DIR"/[0-9]*/ >/dev/null 2>&1; then
    RESUME_FLAG="--resume"; echo "[resume] found existing ckpt in $CKPT_DIR -> --resume"
  else
    RESUME_FLAG="--overwrite"; echo "[resume] no ckpt yet -> fresh --overwrite (warm-start from 14000/params via weight_loader)"
  fi

  exec python -u scripts/train.py pi05_v4_awbc_from_paligemma_warm14k \
    --exp-name "$EXP" \
    --no-wandb-enabled \
    --save-interval 2000 \
    $RESUME_FLAG

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 3

AccessType: "Public"
