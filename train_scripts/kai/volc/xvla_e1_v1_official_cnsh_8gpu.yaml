# XVLA E0 (完全按官方 X-VLA train.py 配方, vis 数据 = Task_A v1 action≠state 真实动作) — cnsh 8 GPU
#   根因链: vision-blind 真因 = action≡state relabel (开环复述观测); v1 满足 action≠state → 切断捷径数据源。
#   阳性对照已证官方模型读视觉 (d_img 12.87mm), 同架构 → 根因在数据链。本实验官方配方 + 真实动作复现读视觉。
#   官方配方: bf16 | wd=0 | 4 param groups | freeze vlm+transformer_core 前1000步 | constant LR + warmup2000
#            | lr 1e-4 | iters 50k | per-device batch 16 (eff 128) | action_qdur=2.0 | ImageNet+ColorJitter。
#   判据: 训完跑 eval_xvla_vision_ablation_offline.py, 视觉影响比 0.000→≳0.5 = 读视觉 (根因坐实)。
#   Data: A_v1_noRelabel_ee6d/<6 dates> (vePFS) | Init: xvla_ckpts (vePFS)
#   Plan: docs/training/future_plans/plans/xvla_proprio_shortcut_openloop_fix.md (E0)
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/xvla_e1_v1_official_cnsh_8gpu.yaml
TaskName: "xvla-e1-v1-official-cnsh-8gpu"
Description: "E1 两链叠加 (E0配方 + use_proprio=False): torch DDP 8 A100, 50k, bf16, 4group, constant LR, bs16/gpu"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G single node

ActiveDeadlineSeconds: 259200
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/xvla_e1_v1_official_${STAMP}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) ==="
  set -x
  nvidia-smi -L
  VENV=/vePFS/tim/workspace/deepdive_kai0/xvla/X-VLA-env/.venv
  XVLA_SB_DIR=/vePFS/tim/workspace/deepdive_kai0/xvla/data/self_built
  INIT=/vePFS/tim/workspace/deepdive_kai0/xvla/xvla_ckpts
  OUT=/vePFS/tim/workspace/deepdive_kai0/xvla/ckpts/xvla_e1_v1_official
  mkdir -p "$OUT"
  export XVLA_SB="$XVLA_SB_DIR"
  export XVLA_CKPT_INIT="$INIT"
  export XVLA_BART_TOK=/vePFS/tim/workspace/deepdive_kai0/xvla/assets/bart-large-tokenizer

  "$VENV/bin/python" -c "import torch; from lerobot.policies.xvla.modeling_xvla import XVLAPolicy; print('venv OK torch', torch.__version__, 'cuda', torch.cuda.is_available(), 'ngpu', torch.cuda.device_count())"
  [ -f "$XVLA_SB_DIR/A_v1_noRelabel_ee6d/2026-04-23/meta/info.json" ] || { echo "FATAL: data missing" >&2; exit 13; }
  [ -f "$INIT/config.json" ]                                          || { echo "FATAL: init missing" >&2; exit 13; }
  [ -f "$XVLA_BART_TOK/tokenizer.json" ]                              || { echo "FATAL: bart tokenizer missing $XVLA_BART_TOK" >&2; exit 13; }
  "$VENV/bin/python" -c "import os; from transformers import AutoTokenizer; AutoTokenizer.from_pretrained(os.environ['XVLA_BART_TOK']); print('bart tokenizer offline OK')"
  echo "[$(date)] preflight OK"

  cd /vePFS/tim/workspace/deepdive_kai0/train_scripts/xvla/launch
  exec "$VENV/bin/python" -m torch.distributed.run --standalone --nproc_per_node=8 xvla_train.py \
    --config E1_v1_official \
    --output_dir "$OUT" \
    --workers 4

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 1

AccessType: "Public"
