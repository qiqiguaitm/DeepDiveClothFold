<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="CRAVE guided pi0.7 style VLA architecture">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/></marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/></marker>
    <marker id="arrOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#ea580c"/></marker>
    <linearGradient id="craveGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f0fdf4"/><stop offset="1" stop-color="#dcfce7"/></linearGradient>
    <linearGradient id="vlmGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#dbeafe"/></linearGradient>
    <linearGradient id="actGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f5f3ff"/><stop offset="1" stop-color="#ede9fe"/></linearGradient>
    <linearGradient id="probGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#ffedd5"/></linearGradient>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC',Arial,sans-serif;font-size:31px;font-weight:780;fill:#111827}
      .sub{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC',Arial,sans-serif;font-size:15px;font-weight:520;fill:#64748b}
      .h{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC',Arial,sans-serif;font-size:19px;font-weight:760;fill:#111827}
      .t{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC',Arial,sans-serif;font-size:13px;font-weight:560;fill:#475569}
      .small{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC',Arial,sans-serif;font-size:11.5px;font-weight:560;fill:#64748b}
      .tiny{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC',Arial,sans-serif;font-size:10.5px;font-weight:650;fill:#475569}
      .math{font-family:'Times New Roman',serif;font-size:16px;font-weight:700;fill:#312e81}
      .box{filter:url(#shadow);stroke-width:1.5}
      .blue{fill:none;stroke:#2563eb;stroke-width:2.6;marker-end:url(#arrBlue)}
      .green{fill:none;stroke:#16a34a;stroke-width:2.6;marker-end:url(#arrGreen)}
      .purple{fill:none;stroke:#7c3aed;stroke-width:2.8;marker-end:url(#arrPurple)}
      .orange{fill:none;stroke:#ea580c;stroke-width:2.6;marker-end:url(#arrOrange)}
      .dash{fill:none;stroke:#94a3b8;stroke-width:1.7;stroke-dasharray:7 6}
      .label{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC',Arial,sans-serif;font-size:12px;font-weight:760;fill:#334155}
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="800" y="45" text-anchor="middle" class="title">CRAVE-guided pi0.7-style VLA</text>
  <text x="800" y="74" text-anchor="middle" class="sub">Use CRAVE only as a compact stage planner; inject predicted latent subgoal and transition probability into the VLA policy.</text>

  <!-- Inputs -->
  <rect class="box" x="55" y="132" width="185" height="122" rx="15" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="147" y="164" text-anchor="middle" class="h">Current input</text>
  <text x="147" y="190" text-anchor="middle" class="t">camera frame</text>
  <text x="147" y="211" text-anchor="middle" class="t">robot state</text>
  <g transform="translate(94 224)">
    <rect width="48" height="28" rx="5" fill="#1f2937"/>
    <rect x="13" y="13" width="22" height="8" rx="4" fill="#e5e7eb"/>
    <rect x="62" y="3" width="44" height="22" rx="5" fill="#eef2ff" stroke="#93c5fd"/>
  </g>

  <rect class="box" x="55" y="617" width="185" height="120" rx="15" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="147" y="650" text-anchor="middle" class="h">Instruction</text>
  <text x="147" y="677" text-anchor="middle" class="t">task text</text>
  <text x="147" y="699" text-anchor="middle" class="t">history tokens</text>

  <!-- CRAVE compact module -->
  <rect class="box" x="292" y="108" width="390" height="398" rx="22" fill="url(#craveGrad)" stroke="#86efac"/>
  <text x="487" y="147" text-anchor="middle" class="h">CRAVE stage planner</text>
  <text x="487" y="174" text-anchor="middle" class="t">one compact block: encoder + recurrence graph + Viterbi</text>

  <rect x="330" y="212" width="150" height="82" rx="12" fill="#ffffff" stroke="#93c5fd"/>
  <text x="405" y="240" text-anchor="middle" class="label">DINOv3-H</text>
  <text x="405" y="262" text-anchor="middle" class="small">image encoder</text>
  <g transform="translate(362 272)">
    <rect width="14" height="14" fill="#bfdbfe" stroke="#60a5fa"/><rect x="18" width="14" height="14" fill="#dbeafe" stroke="#60a5fa"/><rect x="36" width="14" height="14" fill="#fde68a" stroke="#f59e0b"/><rect x="54" width="14" height="14" fill="#bbf7d0" stroke="#22c55e"/>
  </g>

  <rect x="517" y="212" width="126" height="82" rx="12" fill="#ffffff" stroke="#86efac"/>
  <text x="580" y="238" text-anchor="middle" class="label">stage graph</text>
  <text x="580" y="260" text-anchor="middle" class="small">P(next | cur)</text>
  <g transform="translate(548 274)">
    <circle cx="0" cy="0" r="6" fill="#22c55e"/><circle cx="28" cy="-9" r="6" fill="#4f46e5"/><circle cx="58" cy="1" r="6" fill="#f59e0b"/>
    <path d="M6 -1 C14 -7 18 -9 22 -9" fill="none" stroke="#16a34a" stroke-width="3"/><path d="M34 -7 C43 -2 48 0 52 1" fill="none" stroke="#16a34a" stroke-width="3"/>
  </g>

  <rect x="330" y="335" width="313" height="116" rx="13" fill="#ffffff" stroke="#86efac"/>
  <text x="487" y="363" text-anchor="middle" class="label">Viterbi / max-product route</text>
  <line x1="370" y1="402" x2="590" y2="402" stroke="#16a34a" stroke-width="3"/>
  <circle cx="370" cy="402" r="15" fill="#dcfce7" stroke="#16a34a"/>
  <circle cx="480" cy="402" r="15" fill="#fef3c7" stroke="#f59e0b"/>
  <circle cx="590" cy="402" r="15" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="370" y="407" text-anchor="middle" class="tiny">M8</text>
  <text x="480" y="407" text-anchor="middle" class="tiny">M13</text>
  <text x="590" y="407" text-anchor="middle" class="tiny">M17</text>
  <text x="487" y="434" text-anchor="middle" class="small">current stage -> local next / max-completion next</text>

  <path class="blue" d="M241 193 H319"/>
  <path class="green" d="M480 253 H506"/>
  <path class="green" d="M580 295 C580 316 556 324 540 333"/>
  <path class="green" d="M405 295 C405 318 421 326 438 334"/>

  <!-- CRAVE outputs -->
  <rect class="box" x="746" y="115" width="300" height="148" rx="18" fill="url(#actGrad)" stroke="#c4b5fd"/>
  <text x="896" y="151" text-anchor="middle" class="h">Latent subgoal hint</text>
  <text x="896" y="180" text-anchor="middle" class="t">next-stage prototype</text>
  <text x="896" y="205" text-anchor="middle" class="math">g_next = c_{Viterbi next}</text>
  <g transform="translate(833 224)">
    <rect width="17" height="17" fill="#bfdbfe" stroke="#60a5fa"/><rect x="21" width="17" height="17" fill="#dbeafe" stroke="#60a5fa"/><rect x="42" width="17" height="17" fill="#fde68a" stroke="#f59e0b"/><rect x="63" width="17" height="17" fill="#bbf7d0" stroke="#22c55e"/><rect x="84" width="17" height="17" fill="#c4b5fd" stroke="#7c3aed"/><rect x="105" width="17" height="17" fill="#c4b5fd" stroke="#7c3aed"/>
  </g>

  <rect class="box" x="746" y="313" width="300" height="148" rx="18" fill="url(#probGrad)" stroke="#fdba74"/>
  <text x="896" y="349" text-anchor="middle" class="h">Probability prompt</text>
  <text x="896" y="378" text-anchor="middle" class="t">transition confidence</text>
  <text x="896" y="402" text-anchor="middle" class="math">p_next, p_path, stage id</text>
  <rect x="806" y="421" width="180" height="25" rx="12" fill="#ffffff" stroke="#fdba74"/>
  <text x="896" y="438" text-anchor="middle" class="tiny">"next=M17, path prob=0.41"</text>

  <path class="purple" d="M683 247 C710 247 718 191 736 191"/>
  <path class="orange" d="M683 402 C709 402 719 388 736 388"/>

  <!-- VLA -->
  <rect class="box" x="1096" y="95" width="432" height="660" rx="24" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1312" y="135" text-anchor="middle" class="h">pi0.7-style VLA policy</text>
  <text x="1312" y="162" text-anchor="middle" class="t">VLM context reasoning + Action Expert execution</text>

  <rect class="box" x="1140" y="212" width="340" height="150" rx="18" fill="url(#vlmGrad)" stroke="#93c5fd"/>
  <text x="1310" y="248" text-anchor="middle" class="h">VLM backbone</text>
  <text x="1310" y="277" text-anchor="middle" class="t">instruction, observation history, stage text</text>
  <text x="1310" y="303" text-anchor="middle" class="math">[lang, obs, "next stage + prob"]</text>
  <rect x="1188" y="323" width="244" height="24" rx="12" fill="#ffffff" stroke="#93c5fd"/>
  <text x="1310" y="340" text-anchor="middle" class="tiny">probability prompt is appended to VLM context</text>

  <rect class="box" x="1140" y="440" width="340" height="170" rx="18" fill="url(#actGrad)" stroke="#c4b5fd"/>
  <text x="1310" y="476" text-anchor="middle" class="h">Action Expert</text>
  <text x="1310" y="505" text-anchor="middle" class="t">flow / DiT action denoiser</text>
  <text x="1310" y="531" text-anchor="middle" class="math">a_{t:t+H} ~ pi(. | VLM, h_g)</text>
  <rect x="1188" y="553" width="244" height="25" rx="12" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="1310" y="570" text-anchor="middle" class="tiny">latent subgoal tokens enter conditioning stream</text>

  <rect class="box" x="1252" y="665" width="116" height="58" rx="16" fill="#fff7ed" stroke="#fdba74"/>
  <text x="1310" y="690" text-anchor="middle" class="label">action chunk</text>
  <text x="1310" y="711" text-anchor="middle" class="math">a_t ... a_{t+H}</text>

  <!-- Injection paths -->
  <path class="blue" d="M241 677 C550 677 816 287 1128 287"/>
  <text x="633" y="645" text-anchor="middle" class="label">task instruction and observation context</text>

  <path class="orange" d="M1047 388 C1090 388 1103 320 1130 305"/>
  <text x="1088" y="355" text-anchor="middle" class="label">text / scalar prompt</text>

  <rect class="box" x="805" y="535" width="182" height="96" rx="16" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="896" y="568" text-anchor="middle" class="label">subgoal adapter</text>
  <text x="896" y="593" text-anchor="middle" class="math">h_g = W_g g_next</text>
  <text x="896" y="616" text-anchor="middle" class="small">project to VLA token dim</text>

  <path class="purple" d="M896 264 V524"/>
  <path class="purple" d="M988 583 C1040 583 1086 536 1130 528"/>
  <path class="blue" d="M1310 363 V430"/>
  <path class="purple" d="M1310 611 V653"/>

  <!-- Callouts -->
  <rect x="296" y="560" width="384" height="154" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="488" y="595" text-anchor="middle" class="h">Why this differs from BAGEL subgoal images</text>
  <text x="322" y="628" class="t">1. CRAVE outputs a real-data latent prototype, not a generated future image.</text>
  <text x="322" y="657" class="t">2. Viterbi route supplies a probability-aware next-stage prior.</text>
  <text x="322" y="686" class="t">3. VLA still handles low-level execution through its Action Expert.</text>

  <line x1="1096" y1="390" x2="1528" y2="390" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="1118" y="405" class="small">VLM output conditions the action expert; CRAVE latent bypasses language and enters as action-side subgoal conditioning.</text>
</svg>
